<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Φροντιστήριο Θ. Φλωρόπουλος · Καλλιθέα</title>
  <meta name="description" content="Φροντιστήριο Μέσης Εκπαίδευσης Θ. Φλωρόπουλος, Καλλιθέα — προετοιμασία για Λύκειο και Πανελλαδικές από το 1985.">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/site.css">
</head>
<body data-screen-label="Floropoulos">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Primitives -->
  <script type="text/babel" src="components/Wordmark.jsx"></script>
  <script type="text/babel" src="components/SectionHead.jsx"></script>
  <script type="text/babel" src="components/PageHero.jsx"></script>

  <!-- Sections (reused by multiple pages) -->
  <script type="text/babel" src="components/Method.jsx"></script>
  <script type="text/babel" src="components/Programs.jsx"></script>
  <script type="text/babel" src="components/Lessons.jsx"></script>
  <script type="text/babel" src="components/WhyUs.jsx"></script>
  <script type="text/babel" src="components/Results.jsx"></script>
  <script type="text/babel" src="components/Extras.jsx"></script>
  <script type="text/babel" src="components/Contact.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>

  <!-- Router (must be before pages & header that depend on hash) -->
  <script type="text/babel" src="components/Router.jsx"></script>

  <!-- Pages -->
  <script type="text/babel" src="components/HomePage.jsx"></script>
  <script type="text/babel" src="components/FrontistirioPage.jsx"></script>
  <script type="text/babel" src="components/MethodPage.jsx"></script>
  <script type="text/babel" src="components/ProgramsPage.jsx"></script>
  <script type="text/babel" src="components/LessonsPage.jsx"></script>
  <script type="text/babel" src="components/ContactPage.jsx"></script>

  <!-- Header depends on Router (calls useHashRoute) -->
  <script type="text/babel" src="components/Header.jsx"></script>

  <script type="text/babel">
    function App() {
      // Scroll-reveal observer
      React.useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add("is-visible");
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });
        const tick = () => document.querySelectorAll(".reveal:not(.is-visible)").forEach(el => obs.observe(el));
        tick();
        window.addEventListener("hashchange", () => setTimeout(tick, 50));
        return () => obs.disconnect();
      }, []);

      return (
        <React.Fragment>
          <Header />
          <main>
            <RouterView />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
